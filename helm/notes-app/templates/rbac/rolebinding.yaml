apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: notes-backend-rolebinding
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "notes-app.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: notes-backend-serviceaccount
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: notes-backend-role
  apiGroup: rbac.authorization.k8s.io
