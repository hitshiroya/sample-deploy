apiVersion: apps/v1
kind: Deployment
metadata:
  name: notes-postgres
  namespace: notes-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notes-postgres
  template:
    metadata:
      labels:
        app: notes-postgres
    spec:
      containers:
        - name: notes-postgres
          image: hit2403/notes-postgres:v2
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRESQL_USERNAME
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRESQL_PASSWORD
            - name: POSTGRESQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRESQL_DATABASE    
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $POSTGRESQL_USERNAME -d $POSTGRESQL_DATABASE
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $POSTGRESQL_USERNAME -d $POSTGRESQL_DATABASE
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: postgres-storage
              mountPath: /bitnami/postgresql
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
