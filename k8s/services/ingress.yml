apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: notes-ingress
  namespace: notes-app
spec:
  rules:
    - host: notes-app.apps.<cluster-domain>  # replace with actual cluster domain
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: notes-backend
                port:
                  number: 8000         
          - path: /
            pathType: Prefix
            backend:
              service:
                name: notes-frontend
                port:
                  number: 80
         